<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Lilies · Section Header</title>
<style>body{margin:0;background:#fffaf3;}</style>

<!-- ============================================================= -->
<!--  ORANGE LILIES · STANDALONE SECTION HEADER                    -->
<!--  Paste between START and END. Drop this above any grid,        -->
<!--  carousel, or product block to title that section.            -->
<!--  Edit the eyebrow + title text for each use case.             -->
<!-- ============================================================= -->

<!-- ======================= START ======================= -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;600&display=swap');

.ol-header-block{
  --ol-orange:#e8780a;     /* same accent used across all Orange Lilies sections */
  --ol-ink:#2f2a24;

  padding:48px 20px;
  background-color:#fffaf3;
  text-align:center;
  max-width:1200px;
  margin:0 auto;
  font-family:'Manrope',sans-serif;
  box-sizing:border-box;
}

.ol-header-block__inner{margin-bottom:0;}

.ol-header-block__eyebrow{
  display:block;margin-bottom:10px;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  color:var(--ol-orange);font-weight:700;
}

/* Title row with hairline + ✦ sparkle (matches the category section) */
.ol-header-block__title-row{
  display:flex;align-items:center;justify-content:center;gap:14px;
  flex-wrap:wrap;
}
.ol-header-block__line{flex:1 1 auto;max-width:90px;height:1px;background:rgba(232,120,10,.3);}
.ol-header-block__spark{color:var(--ol-orange);font-size:13px;line-height:1;flex-shrink:0;}

.ol-header-block__title{
  margin:0;font-size:32px;font-weight:600;color:var(--ol-ink);
  font-family:'Playfair Display',serif;
  line-height:1.25;
}

/* ---- Responsive ---- */
@media(max-width:768px){
  .ol-header-block{padding:38px 16px;}
  .ol-header-block__title{font-size:26px;}
  .ol-header-block__line{max-width:50px;}
  .ol-header-block__eyebrow{font-size:12px;}
}
@media(max-width:480px){
  .ol-header-block{padding:30px 14px;}
  .ol-header-block__title{font-size:21px;}
  .ol-header-block__line{max-width:26px;}
  .ol-header-block__eyebrow{font-size:11px;letter-spacing:1.5px;margin-bottom:8px;}
  .ol-header-block__title-row{gap:8px;}
}
@media(max-width:360px){
  .ol-header-block{padding:24px 12px;}
  .ol-header-block__title{font-size:18px;}
  .ol-header-block__line{display:none;}            /* keep just the sparkles when space is tight */
  .ol-header-block__title-row{gap:8px;}
}
</style>

<section class="ol-header-block">
  <div class="ol-header-block__inner">
    <span class="ol-header-block__eyebrow">Period Care Essentials</span>
    <div class="ol-header-block__title-row">
      <span class="ol-header-block__line"></span>
      <span class="ol-header-block__spark">&#10038;</span>
      <h2 class="ol-header-block__title">Shop Our Bestsellers</h2>
      <span class="ol-header-block__spark">&#10038;</span>
      <span class="ol-header-block__line"></span>
    </div>
  </div>
</section>
<!-- ======================== END ======================== -->

</body>
</html>
