<!-- ============================================================= -->
<!--  ORANGE LILIES · STANDALONE SECTION HEADER (premium)          -->
<!--  Drop above any grid / carousel / product block to title it.  -->
<!--  Edit the eyebrow + title text for each use case.             -->
<!-- ============================================================= -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@500;600&display=swap');

  .ol-shead{
    --o:#e8780a; --gold:#c8912f; --ink:#2f2a24;
    padding:72px 20px 44px;background:#fffaf3;text-align:center;
    max-width:1200px;margin:0 auto;font-family:'Manrope',sans-serif;box-sizing:border-box;
  }
  .ol-shead__eyebrow{display:block;margin-bottom:14px;font-size:.72rem;letter-spacing:.34em;
    text-transform:uppercase;color:var(--o);font-weight:700;}
  .ol-shead__row{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;}
  .ol-shead__line{flex:1 1 auto;max-width:110px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold));}
  .ol-shead__line.r{background:linear-gradient(90deg,var(--gold),transparent);}
  .ol-shead__dot{width:7px;height:7px;background:var(--o);border-radius:50%;
    transform:rotate(45deg);flex-shrink:0;}
  .ol-shead__title{margin:0;font-size:clamp(1.7rem,3.2vw,2.5rem);font-weight:700;color:var(--ink);
    font-family:'Playfair Display',serif;line-height:1.18;letter-spacing:-.01em;}

  .ol-shead.is-on .rv{opacity:0;transform:translateY(22px);
    transition:opacity .8s cubic-bezier(.22,.61,.36,1),transform .8s cubic-bezier(.22,.61,.36,1);}
  .ol-shead.is-on .rv.in{opacity:1;transform:none;}
  @media(prefers-reduced-motion:reduce){.ol-shead.is-on .rv{opacity:1!important;transform:none!important;}}

  @media(max-width:768px){.ol-shead{padding:54px 16px 32px;}.ol-shead__line{max-width:60px;}}
  @media(max-width:480px){.ol-shead__line{max-width:30px;}}
</style>

<section class="ol-shead">
  <div class="rv">
    <span class="ol-shead__eyebrow">Period Care Essentials</span>
    <div class="ol-shead__row">
      <span class="ol-shead__line"></span>
      <span class="ol-shead__dot"></span>
      <h2 class="ol-shead__title">Shop Our Bestsellers</h2>
      <span class="ol-shead__dot"></span>
      <span class="ol-shead__line r"></span>
    </div>
  </div>
</section>

<script>
(function () {
  var R = document.querySelector('.ol-shead');
  if (!R || !('IntersectionObserver' in window)) return;
  R.classList.add('is-on');
  var E = [].slice.call(R.querySelectorAll('.rv'));
  var io = new IntersectionObserver(function (en) {
    en.forEach(function (x) { if (x.isIntersecting) { x.target.classList.add('in'); io.unobserve(x.target); } });
  }, { threshold: 0.2 });
  E.forEach(function (el) { io.observe(el); });
})();
</script>
