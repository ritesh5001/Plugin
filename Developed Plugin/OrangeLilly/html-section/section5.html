<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOWY · Section Header</title>
<style>body{margin:0;background:#ffffff;}</style>

<!-- ============================================================= -->
<!--  SLOWY · STANDALONE SECTION HEADER                            -->
<!--  Paste between START and END. Drop this above any grid,       -->
<!--  carousel, or product block to title that section.            -->
<!--  Edit the eyebrow + title text for each use case.             -->
<!-- ============================================================= -->

<!-- ======================= START ======================= -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500;600&display=swap');

.slowy-header-block{
  --slowy-gold:#c89b6a;     /* same accent used across all SLOWY sections */
  --slowy-ink:#2c2c2c;

  padding:48px 20px;
  background-color:#ffffff;
  text-align:center;
  max-width:1200px;
  margin:0 auto;
  font-family:'Poppins',sans-serif;
  box-sizing:border-box;
}

.slowy-header-block__inner{margin-bottom:0;}

.slowy-header-block__eyebrow{
  display:block;margin-bottom:10px;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  color:var(--slowy-gold);font-weight:600;
}

/* Title row with the same hairline + ✦ sparkle used in the category section */
.slowy-header-block__title-row{
  display:flex;align-items:center;justify-content:center;gap:14px;
  flex-wrap:wrap;
}
.slowy-header-block__line{flex:1 1 auto;max-width:90px;height:1px;background:rgba(156,132,91,.3);}
.slowy-header-block__spark{color:var(--slowy-gold);font-size:13px;line-height:1;flex-shrink:0;}

.slowy-header-block__title{
  margin:0;font-size:32px;font-weight:600;color:var(--slowy-ink);
  font-family:'Playfair Display',serif;
  line-height:1.25;
}

/* ---- Responsive ---- */
@media(max-width:768px){
  .slowy-header-block{padding:38px 16px;}
  .slowy-header-block__title{font-size:26px;}
  .slowy-header-block__line{max-width:50px;}
  .slowy-header-block__eyebrow{font-size:12px;}
}
@media(max-width:480px){
  .slowy-header-block{padding:30px 14px;}
  .slowy-header-block__title{font-size:21px;}
  .slowy-header-block__line{max-width:26px;}
  .slowy-header-block__eyebrow{font-size:11px;letter-spacing:1.5px;margin-bottom:8px;}
  .slowy-header-block__title-row{gap:8px;}
}
@media(max-width:360px){
  .slowy-header-block{padding:24px 12px;}
  .slowy-header-block__title{font-size:18px;}
  .slowy-header-block__line{display:none;}            /* keep just the sparkles when space is tight */
  .slowy-header-block__title-row{gap:8px;}
}
</style>

<section class="slowy-header-block">
  <div class="slowy-header-block__inner">
    <span class="slowy-header-block__eyebrow">Curated Essentials</span>
    <div class="slowy-header-block__title-row">
      <span class="slowy-header-block__line"></span>
      <span class="slowy-header-block__spark">&#10038;</span>
      <h2 class="slowy-header-block__title">Signature Collections</h2>
      <span class="slowy-header-block__spark">&#10038;</span>
      <span class="slowy-header-block__line"></span>
    </div>
  </div>
</section>
<!-- ======================== END ======================== -->

</body>
</html>
