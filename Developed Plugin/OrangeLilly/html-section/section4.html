<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;600&display=swap');

.ol-cat{
  --ol-ink:#2f2a24;          /* title */
  --ol-label:#6f665b;        /* category labels */
  --ol-orange:#e8780a;       /* brand accent */
  --ol-disc:#fbeeda;         /* pale circle fill */
  --ol-line:#f1e3cd;         /* hairline rules */
  --ol-bg:#fffaf3;

  display:block;
  width:100%;
  padding:60px 20px;
  background:var(--ol-bg);
  font-family:'Manrope',sans-serif;
  text-align:center;
  box-sizing:border-box;
}
.ol-cat__inner{max-width:1080px;width:100%;margin:0 auto;}

/* ---- Title row: hairline — ✦ SHOP BY CATEGORY ✦ — hairline ---- */
.ol-cat__head{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin:0 auto 46px;
  width:100%;
}
.ol-cat__line{flex:1 1 auto;max-width:150px;height:1px;background:var(--ol-line);}
.ol-cat__spark{color:var(--ol-orange);font-size:13px;line-height:1;}
.ol-cat__title{
  margin:0;white-space:nowrap;
  font-family:'Playfair Display',serif;font-weight:600;
  font-size:24px;letter-spacing:3px;text-transform:uppercase;
  color:var(--ol-ink);
}

/* ---- Row of categories ---- */
.ol-cat__grid{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:18px;
  max-width:900px;width:100%;margin:0 auto;
  overflow:visible;
}

.ol-cat__item{
  text-decoration:none;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  flex:0 0 calc((100% - 5 * 18px) / 6);   /* 6 equal columns */
  min-width:100px;
}

/* Pale disc holding the product image */
.ol-cat__disc{
  width:100%;max-width:128px;aspect-ratio:1/1;border-radius:50%;
  background:var(--ol-disc);overflow:hidden;position:relative;
  border:2px solid #f6dcb8;
  transition:transform .35s ease, box-shadow .35s ease, border-color .35s ease;
}
.ol-cat__disc img{
  width:100%;height:100%;object-fit:cover;position:absolute;inset:0;
  transition:transform .5s ease;
}
.ol-cat__item:hover .ol-cat__disc{
  transform:translateY(-6px);
  border-color:var(--ol-orange);
  box-shadow:0 12px 26px rgba(232,120,10,.22);
}
.ol-cat__item:hover .ol-cat__disc img{transform:scale(1.08);}

/* Label */
.ol-cat__name{
  font-size:12px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--ol-label);transition:color .3s ease;
}
.ol-cat__item:hover .ol-cat__name{color:var(--ol-orange);}

/* ---- Responsive ---- */
@media(max-width:860px){
  .ol-cat{padding:48px 20px 56px;}
  .ol-cat__grid{gap:26px 16px;}
  .ol-cat__item{flex:0 0 calc((100% - 3 * 16px) / 4);min-width:80px;}   /* 4 per row */
  .ol-cat__line{max-width:80px;}
  .ol-cat__title{font-size:20px;letter-spacing:2px;}
}
@media(max-width:520px){
  .ol-cat{padding:36px 16px 48px;}
  .ol-cat__grid{gap:24px 10px;row-gap:30px;}
  .ol-cat__item{flex:0 0 calc((100% - 2 * 10px) / 3);min-width:0;gap:10px;}   /* 3 per row */
  .ol-cat__title{font-size:16px;letter-spacing:1.5px;white-space:normal;}
  .ol-cat__line{max-width:30px;}
  .ol-cat__name{font-size:11px;letter-spacing:.6px;}
}
</style>

<section class="ol-cat">

    </div>

    <div class="ol-cat__grid">

      <a class="ol-cat__item" href="/product-category/disposable-panties/">

      <a class="ol-cat__item" href="/product-category/overnight-protection/">

        </div>
        <span class="ol-cat__name">Teen Care</span>
      </a>

        <div class="ol-cat__disc">
