<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  .ol-scroll-container {
    width: 100%;
    overflow: hidden;
    padding: 14px 0;
    background: #fffaf3;
    border-top: 1px solid #f1e3cd;
    border-bottom: 1px solid #f1e3cd;
  }

  .ol-scroll-track {
    display: flex;
    width: max-content;
    align-items: center;
    animation: olLoopScroll 40s linear infinite;
  }

  .ol-scroll-item {
    text-align: center;
    margin: 0 20px;
    min-width: 150px;
  }

  .ol-scroll-item i {
    font-size: 32px;
    color: #e8780a;
  }

  .ol-scroll-item p {
    margin-top: 8px;
    margin-bottom: 0 !important;
    font-size: 13px;
    color: #2f2a24;
    font-weight: 700;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  @keyframes olLoopScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* TABLET */
  @media (max-width: 768px) {
    .ol-scroll-item { min-width: calc(100vw / 5); margin: 0 10px; }
    .ol-scroll-item i { font-size: 27px; }
    .ol-scroll-item p { font-size: 11px; }
  }

  /* MOBILE */
  @media (max-width: 480px) {
    .ol-scroll-item { min-width: calc(100vw / 3.5); margin: 0 8px; }
    .ol-scroll-item i { font-size: 23px; }
    .ol-scroll-item p { font-size: 10px; }
  }
</style>

<div class="ol-scroll-container">
