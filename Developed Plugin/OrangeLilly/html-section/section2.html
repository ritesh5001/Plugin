<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  .scroll-container {
    width: 100%;
    overflow: hidden;
    padding: 12px 0; /* Perfectly balanced top and bottom padding */
    background: #ffffff;
    border-bottom: 1px solid #9c845b; 
  }

  .scroll-track {
    display: flex;
    width: max-content;
    align-items: center; /* Keeps items vertically centered */
    animation: loopScroll 40s linear infinite;
  }

  .scroll-item {
    text-align: center;
    margin: 0 20px;
    min-width: 150px; 
  }

  .scroll-item i {
    font-size: 34px; 
    color: #9c845b; 
  }

  .scroll-item p {
    margin-top: 8px; 
    margin-bottom: 0 !important; /* Forces the hidden bottom margin to zero */
    font-size: 13px;
    color: #2c2c2c; 
    font-weight: 700;
    font-family: inherit;
    text-transform: uppercase; 
    letter-spacing: 0.5px;
  }

  @keyframes loopScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* ---------------------------------- */
  /* RESPONSIVE RULES                   */
  /* ---------------------------------- */

  /* TABLET */
  @media (max-width: 768px) {
    .scroll-item {
      min-width: calc(100vw / 5); 
      margin: 0 10px;
    }

    .scroll-item i {
      font-size: 28px;
    }

    .scroll-item p {
      font-size: 11px;
    }
  }

  /* MOBILE */
  @media (max-width: 480px) {
    .scroll-item {
      min-width: calc(100vw / 3.5); 
      margin: 0 8px;
    }

    .scroll-item i {
      font-size: 24px;
    }

    .scroll-item p {
      font-size: 10px;
    }
  }
</style>

<div class="scroll-container">
  <div class="scroll-track">

    <div class="scroll-item">
      <i class="fa-solid fa-truck-fast"></i>
      <p>Free Delivery</p>
    </div>

    <div class="scroll-item">

    </div>
