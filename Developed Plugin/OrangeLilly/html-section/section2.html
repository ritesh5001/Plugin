<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap');

  .ol-trust{
    --o:#e8780a; --o2:#cf6f08; --ink:#2f2a24; --muted:#7a7065;
    width:100%;overflow:hidden;background:#fffaf3;
    border-top:1px solid #f1e3cd;border-bottom:1px solid #f1e3cd;
    padding:30px 0;font-family:'Manrope',sans-serif;
    -webkit-mask-image:linear-gradient(to right,transparent,#000 7%,#000 93%,transparent);
            mask-image:linear-gradient(to right,transparent,#000 7%,#000 93%,transparent);
  }
  .ol-trust-track{display:flex;align-items:center;width:max-content;animation:olTrust 38s linear infinite;}
  .ol-trust:hover .ol-trust-track{animation-play-state:paused;}
  .ol-trust-item{display:flex;align-items:center;gap:14px;padding:0 34px;flex-shrink:0;}
  .ol-trust-ic{
    width:46px;height:46px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--o);
    background:linear-gradient(135deg,rgba(240,152,42,.16),rgba(232,120,10,.10));
    border:1px solid #f1e3cd;
  }
  .ol-trust-item p{
    margin:0;font-size:12px;font-weight:700;color:var(--ink);
    text-transform:uppercase;letter-spacing:.12em;line-height:1.3;
  }
  @keyframes olTrust{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @media(max-width:600px){.ol-trust-item{padding:0 22px;gap:11px;}.ol-trust-ic{width:40px;height:40px;font-size:16px;}.ol-trust-item p{font-size:10.5px;}}
</style>

<div class="ol-trust">
  <div class="ol-trust-track">
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-truck-fast"></i></span><p>Free Delivery</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-hand-holding-dollar"></i></span><p>COD Available</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-arrow-rotate-left"></i></span><p>Easy Returns</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-shield-heart"></i></span><p>Dermatologically Tested</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-box"></i></span><p>Discreet Packaging</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-leaf"></i></span><p>Eco-Friendly</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-lock"></i></span><p>Secure Payments</p></div>
    <!-- duplicate for seamless loop -->
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-truck-fast"></i></span><p>Free Delivery</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-hand-holding-dollar"></i></span><p>COD Available</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-arrow-rotate-left"></i></span><p>Easy Returns</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-shield-heart"></i></span><p>Dermatologically Tested</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-box"></i></span><p>Discreet Packaging</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-leaf"></i></span><p>Eco-Friendly</p></div>
    <div class="ol-trust-item"><span class="ol-trust-ic"><i class="fa-solid fa-lock"></i></span><p>Secure Payments</p></div>
  </div>
</div>
